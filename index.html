<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Декомпозитор целей</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600&family=Onest:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #c8f04f;
    --accent-dim: #8aaa2a;
    --text: #f0f0f0;
    --muted: #888;
    --danger: #ff5f5f;
    --success: #4fcf94;
    --info: #5fb8ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .page { max-width: 700px; margin: 0 auto; }

  .header { margin-bottom: 3rem; padding-top: 1rem; }
  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px; font-weight: 400;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 1.5rem;
  }
  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 600; line-height: 1.15;
    color: var(--text); margin-bottom: 0.75rem;
  }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 15px; color: var(--muted); line-height: 1.6; font-weight: 300; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px; padding: 1.75rem; margin-bottom: 1.5rem;
  }

  label {
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
    color: var(--muted); display: block; margin-bottom: 8px;
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 15px; font-weight: 400;
    padding: 12px 14px; outline: none;
    transition: border-color 0.2s;
    appearance: none; -webkit-appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; line-height: 1.5; }

  .field { margin-bottom: 1.25rem; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }

  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '▾'; position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%); color: var(--muted);
    pointer-events: none; font-size: 14px;
  }
  select { padding-right: 36px; cursor: pointer; }
  select option { background: #222; }

  .btn {
    width: 100%; padding: 14px 20px;
    background: var(--accent); color: #0f0f0f;
    border: none; border-radius: 10px;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; transition: background 0.2s, transform 0.1s, opacity 0.2s;
  }
  .btn:hover { background: #d4f55a; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .error {
    background: rgba(255,95,95,0.1); border: 1px solid rgba(255,95,95,0.3);
    color: var(--danger); border-radius: 10px; padding: 12px 14px;
    font-size: 13px; margin-top: 1rem; line-height: 1.5; display: none;
  }
  .error.show { display: block; }

  .result-head { margin-bottom: 1.5rem; }
  .result-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 0.5rem;
  }
  .result-title {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(18px, 3.5vw, 26px);
    font-weight: 600; line-height: 1.2; color: var(--text); margin-bottom: 0.5rem;
  }
  .result-meta { font-size: 13px; color: var(--muted); }

  .summary {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--accent); border-radius: 10px;
    padding: 1rem 1.25rem; margin-bottom: 1.5rem;
    font-size: 14px; color: #ccc; line-height: 1.7; font-weight: 300;
  }

  .steps-label {
    font-size: 11px; font-weight: 500; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 1rem;
  }

  .step {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 1.25rem; margin-bottom: 10px;
    transition: border-color 0.2s; animation: fadeUp 0.3s ease both;
  }
  .step:hover { border-color: #3a3a3a; }

  .step-top { display: flex; gap: 14px; align-items: flex-start; }
  .step-num {
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(200,240,79,0.1); border: 1px solid rgba(200,240,79,0.25);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600;
    color: var(--accent); flex-shrink: 0; margin-top: 2px;
  }
  .step-body { flex: 1; }
  .step-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 6px; line-height: 1.3; }
  .step-desc { font-size: 13px; color: var(--muted); line-height: 1.65; font-weight: 300; }

  .step-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .tag { font-size: 12px; padding: 4px 10px; border-radius: 20px; }
  .tag-time { background: rgba(95,184,255,0.1); color: var(--info); border: 1px solid rgba(95,184,255,0.2); }
  .tag-result { background: rgba(79,207,148,0.1); color: var(--success); border: 1px solid rgba(79,207,148,0.2); }
  .tag-dep { background: rgba(255,255,255,0.05); color: var(--muted); border: 1px solid var(--border); }

  .joke-box {
    margin-top: 1.5rem; padding: 1rem 1.25rem;
    background: rgba(200,240,79,0.04); border: 1px solid rgba(200,240,79,0.12);
    border-radius: 10px; font-size: 13px; color: #888;
    font-style: italic; line-height: 1.6; font-weight: 300;
  }
  .joke-box::before { content: '// '; color: var(--accent-dim); font-style: normal; font-family: monospace; }

  .export-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border);
  }
  .export-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); font-family: 'Onest', sans-serif;
    font-size: 13px; cursor: pointer; transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .export-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(200,240,79,0.05); }
  .export-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  .reset-btn {
    margin-top: 1.5rem; background: transparent;
    border: 1px solid var(--border); color: var(--muted);
    border-radius: 10px; padding: 10px 20px;
    font-family: 'Onest', sans-serif; font-size: 13px;
    cursor: pointer; transition: border-color 0.2s, color 0.2s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading { text-align: center; padding: 3rem 0; color: var(--muted); font-size: 14px; font-weight: 300; }
  .loading .spinner {
    width: 36px; height: 36px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .step:nth-child(1){animation-delay:0.05s} .step:nth-child(2){animation-delay:0.1s}
  .step:nth-child(3){animation-delay:0.15s} .step:nth-child(4){animation-delay:0.2s}
  .step:nth-child(5){animation-delay:0.25s} .step:nth-child(6){animation-delay:0.3s}
  .step:nth-child(7){animation-delay:0.35s} .step:nth-child(8){animation-delay:0.4s}
  .step:nth-child(9){animation-delay:0.45s} .step:nth-child(10){animation-delay:0.5s}

  @media print {
    body { background: #fff; color: #111; padding: 0; }
    .header, #formCard, .export-bar, .reset-btn { display: none !important; }
    #result { display: block !important; }
    .result-title { color: #111; } .result-label, .result-meta { color: #666; }
    .summary { background: #f5f5f5; border-color: #ccc; border-left-color: #888; color: #333; }
    .step { background: #f9f9f9; border-color: #ddd; page-break-inside: avoid; }
    .step-name { color: #111; } .step-desc { color: #444; }
    .step-num { background: #eee; border-color: #bbb; color: #333; }
    .tag-time { background: #e8f4ff; color: #1a6aaa; border-color: #b3d4ef; }
    .tag-result { background: #e8fff4; color: #1a7a4a; border-color: #b3e8cc; }
    .joke-box { background: #f5f5f5; border-color: #ccc; color: #666; }
    .steps-label { color: #666; }
  }

  @media (max-width: 480px) { .row { grid-template-columns: 1fr; } .form-card { padding: 1.25rem; } }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="logo">Goal Decomposer</div>
    <h1>Большие цели —<br><span>маленькие шаги</span></h1>
    <p class="subtitle">Введите любую цель. Получите чёткий план с реальными сроками и конкретными результатами. Без воды.</p>
  </div>

  <div class="form-card" id="formCard">
    <div class="field">
      <label>Ваша цель</label>
      <textarea id="goal" rows="3" placeholder="Например: запустить онлайн-школу по дизайну, написать книгу, похудеть на 15 кг..."></textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Область</label>
        <div class="select-wrap">
          <select id="domain">
            <option value="general">Общая</option>
            <option value="startup">Стартап / бизнес</option>
            <option value="personal">Личное развитие</option>
            <option value="tech">Разработка / IT</option>
            <option value="marketing">Маркетинг</option>
            <option value="education">Обучение</option>
            <option value="career">Карьера</option>
            <option value="health">Здоровье / спорт</option>
            <option value="creative">Творчество</option>
            <option value="finance">Финансы</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Временной горизонт</label>
        <div class="select-wrap">
          <select id="horizon">
            <option value="week">1 неделя</option>
            <option value="month">1 месяц</option>
            <option value="quarter" selected>3 месяца</option>
            <option value="halfyear">6 месяцев</option>
            <option value="year">1 год</option>
            <option value="open">Без ограничений</option>
          </select>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Начальные данные (опционально)</label>
      <textarea id="context" rows="2" placeholder="Что уже есть: опыт, ресурсы, ограничения, команда, бюджет..."></textarea>
    </div>

    <button class="btn" id="generateBtn" onclick="generate()">Декомпозировать →</button>
    <div class="error" id="error"></div>
  </div>

  <div id="result"></div>
</div>

<script>
var currentPlan = null;

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('show');
}
function hideError() { document.getElementById('error').classList.remove('show'); }

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function generate() {
  hideError();
  var goal = document.getElementById('goal').value.trim();
  var domain = document.getElementById('domain').value;
  var horizon = document.getElementById('horizon').value;
  var ctx = document.getElementById('context').value.trim();
  var btn = document.getElementById('generateBtn');
  var resultEl = document.getElementById('result');

  if (!goal) { showError('Введите цель — без неё декомпозировать нечего.'); return; }

  btn.disabled = true;
  btn.textContent = 'Думаем...';
  resultEl.style.display = 'block';
  resultEl.innerHTML = '<div class="loading"><div class="spinner"></div>Декомпозируем цель...</div>';

  try {
    var resp = await fetch('/.netlify/functions/decompose', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ goal, domain, horizon, context: ctx })
    });

    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Ошибка сервера');

    currentPlan = data;
    renderResult(data);
  } catch(e) {
    resultEl.style.display = 'none';
    showError('Ошибка: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Декомпозировать →';
  }
}

function renderResult(plan) {
  var html = '';
  html += '<div class="result-head">';
  html += '<div class="result-label">Готовый план</div>';
  html += '<div class="result-title">' + esc(plan.title) + '</div>';
  html += '<div class="result-meta">Общее время: ' + esc(plan.total_time) + '</div>';
  html += '</div>';
  html += '<div class="summary">' + esc(plan.summary) + '</div>';
  html += '<div class="steps-label">Шаги</div><div id="steps-list">';
  (plan.steps || []).forEach(function(s) {
    html += '<div class="step"><div class="step-top">';
    html += '<div class="step-num">' + s.num + '</div>';
    html += '<div class="step-body">';
    html += '<div class="step-name">' + esc(s.name) + '</div>';
    html += '<div class="step-desc">' + esc(s.description) + '</div>';
    html += '<div class="step-tags">';
    html += '<span class="tag tag-time">⏱ ' + esc(s.time) + '</span>';
    html += '<span class="tag tag-result">✓ ' + esc(s.result) + '</span>';
    if (s.depends_on && s.depends_on.length > 0)
      html += '<span class="tag tag-dep">после шагов: ' + s.depends_on.join(', ') + '</span>';
    html += '</div></div></div></div>';
  });
  html += '</div>';
  if (plan.joke) html += '<div class="joke-box">' + esc(plan.joke) + '</div>';

  html += '<div class="export-bar">';
  html += '<button class="export-btn" onclick="exportTxt()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1.5"/><line x1="5" y1="5" x2="11" y2="5"/><line x1="5" y1="8" x2="11" y2="8"/><line x1="5" y1="11" x2="9" y2="11"/></svg>Скачать .txt</button>';
  html += '<button class="export-btn" onclick="exportWord()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="1" width="12" height="14" rx="1.5"/><path d="M5 5l1.5 6 1.5-4 1.5 4L11 5"/></svg>Скачать .doc</button>';
  html += '<button class="export-btn" onclick="window.print()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="1" width="8" height="4" rx="1"/><rect x="1" y="5" width="14" height="7" rx="1"/><rect x="4" y="9" width="8" height="6" rx="1"/><circle cx="12" cy="8" r="0.8" fill="currentColor"/></svg>Распечатать</button>';
  html += '</div>';
  html += '<button class="reset-btn" onclick="resetForm()">← Новая цель</button>';

  document.getElementById('result').innerHTML = html;
}

function planToText(plan) {
  var lines = ['ДЕКОМПОЗИТОР ЦЕЛЕЙ', '==================', '', 'ПЛАН: ' + plan.title, 'Общее время: ' + plan.total_time, '', 'ОПИСАНИЕ:', plan.summary, '', 'ШАГИ:', '------'];
  (plan.steps || []).forEach(function(s) {
    lines.push('', 'Шаг ' + s.num + ': ' + s.name, s.description, '  Время: ' + s.time, '  Результат: ' + s.result);
    if (s.depends_on && s.depends_on.length > 0) lines.push('  Зависит от шагов: ' + s.depends_on.join(', '));
  });
  if (plan.joke) lines.push('', '// ' + plan.joke);
  lines.push('', 'Создано: ' + new Date().toLocaleDateString('ru-RU'));
  return lines.join('\n');
}

function exportTxt() {
  if (!currentPlan) return;
  var blob = new Blob([planToText(currentPlan)], { type: 'text/plain;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'plan.txt'; a.click(); URL.revokeObjectURL(a.href);
}

function exportWord() {
  if (!currentPlan) return;
  var p = currentPlan;
  var rows = '';
  (p.steps || []).forEach(function(s) {
    var dep = (s.depends_on && s.depends_on.length > 0) ? '<p style="color:#888;font-size:11pt;">Зависит от шагов: ' + s.depends_on.join(', ') + '</p>' : '';
    rows += '<tr><td style="width:40px;text-align:center;font-weight:bold;font-size:14pt;color:#5a8a00;vertical-align:top;padding:12px 8px;">' + s.num + '</td><td style="padding:12px 8px;vertical-align:top;"><p style="font-weight:bold;font-size:12pt;margin:0 0 4px;">' + s.name + '</p><p style="font-size:11pt;color:#444;margin:0 0 8px;">' + s.description + '</p><p style="font-size:10pt;color:#1a6aaa;margin:0 0 2px;">⏱ ' + s.time + '</p><p style="font-size:10pt;color:#1a7a4a;margin:0 0 2px;">✓ ' + s.result + '</p>' + dep + '</td></tr>';
  });
  var html = '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Calibri,Arial,sans-serif;margin:2cm;color:#222;}h1{font-size:20pt;}.meta{color:#888;font-size:11pt;margin-bottom:20px;}.summary{background:#f5f8ee;border-left:4px solid #8aaa2a;padding:12px 16px;margin-bottom:24px;font-size:11pt;line-height:1.6;}table{width:100%;border-collapse:collapse;}tr{border-bottom:1px solid #e0e0e0;}.joke{margin-top:24px;color:#888;font-style:italic;font-size:10pt;}.footer{margin-top:32px;color:#aaa;font-size:9pt;}</style></head><body><h1>' + p.title + '</h1><p class="meta">Общее время: ' + p.total_time + '</p><div class="summary">' + p.summary + '</div><table>' + rows + '</table>' + (p.joke ? '<p class="joke">// ' + p.joke + '</p>' : '') + '<p class="footer">Создано: ' + new Date().toLocaleDateString('ru-RU') + ' · Goal Decomposer</p></body></html>';
  var blob = new Blob([html], { type: 'application/msword;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'plan.doc'; a.click(); URL.revokeObjectURL(a.href);
}

function resetForm() {
  currentPlan = null;
  document.getElementById('result').style.display = 'none';
  document.getElementById('result').innerHTML = '';
  document.getElementById('goal').value = '';
  document.getElementById('context').value = '';
  document.getElementById('goal').focus();
  hideError();
}
</script>
</body>
</html>
